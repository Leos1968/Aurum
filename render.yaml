# Render blueprint: creates the Aurum API service automatically when the
# repo is connected at https://dashboard.render.com/blueprints
services:
  - type: web
    name: aurum-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: FRONTEND_ORIGIN
        sync: false
