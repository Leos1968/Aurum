name: Keep API warm

# Render's free tier spins the API dyno down after ~15 minutes idle, and
# the cold start costs the next visitor ~50 seconds. Pinging the health
# endpoint on a schedule keeps it awake so first loads stay fast.
#
# GitHub delays scheduled runs under load, so the effective interval is
# looser than the cron; every ~10 minutes keeps a 15-minute-idle dyno
# warm most of the time. Runs can also be triggered manually.

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /api/health
        run: |
          for attempt in 1 2 3; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 90 \
              https://aurum-api-bqrb.onrender.com/api/health)
            echo "Attempt $attempt: HTTP $code"
            if [ "$code" = "200" ]; then exit 0; fi
            sleep 15
          done
          echo "Health check did not return 200 after 3 attempts"
          exit 1
