name: Keep API warm & cache primed

# Two jobs in one:
# 1. Ping the Render backend so its free-tier dyno stays awake when GitHub
#    actually honors the schedule (GitHub delays cron on quiet repos, so
#    this alone is not the availability story).
# 2. Warm the Vercel edge-cache proxy for the dashboard and the most
#    popular tickers. Visitors are served from that cache instantly with
#    stale-while-revalidate, so even when the backend IS cold, the site
#    stays fast; this job just keeps the cached data reasonably fresh.

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  warm:
    runs-on: ubuntu-latest
    steps:
      - name: Wake backend
        run: |
          for attempt in 1 2 3; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 90 \
              https://aurum-api-bqrb.onrender.com/api/health)
            echo "Backend attempt $attempt: HTTP $code"
            if [ "$code" = "200" ]; then break; fi
            sleep 15
          done
      - name: Prime edge cache
        run: |
          base="https://aurum-terminal.vercel.app/api/aurum"
          paths=(
            "api/market/tape"
            "api/market/sectors"
            "api/market/movers?kind=gainers"
            "api/market/movers?kind=losers"
            "api/market/movers?kind=actives"
            "api/market/news"
          )
          for t in AAPL MSFT NVDA TSLA AMZN GOOGL; do
            paths+=("api/company/$t" "api/company/$t/stats" "api/company/$t/history?range=1Y")
          done
          for p in "${paths[@]}"; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 75 "$base/$p")
            echo "$p -> $code"
          done
